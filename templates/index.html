<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Interview Prep Agent</title>
    <link rel="stylesheet" href="/static/style.css" />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
</head>
<body>
    <div class="card">
        <h1>Interview Prep Agent</h1>
        <form id="prepForm" enctype="multipart/form-data">
            <div class="field">
                <label for="resume">Resume (PDF)</label>
                <input type="file" id="resume" name="resume" accept="application/pdf" required />
            </div>
            <div class="field">
                <label for="jobUrl">Job Posting URL</label>
                <input type="url" id="jobUrl" name="job_url" placeholder="https://..." required />
            </div>
            <button type="submit">Generate Brief</button>
        </form>
        <div class="spinner" id="spinner"></div>
        <div class="result" id="result" style="display:none;"></div>
        <button class="download-btn" id="downloadBtn" style="display:none;">Download PDF</button>
    </div>
    <script src="/static/script.js"></script>
</body>
</html>
